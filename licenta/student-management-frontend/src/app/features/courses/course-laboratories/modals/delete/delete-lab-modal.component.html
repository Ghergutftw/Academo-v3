<div class="modal-header">
  <h5 class="modal-title">Confirmă ștergerea laboratorului</h5>
  <button type="button" class="btn-close" aria-label="Închide" (click)="cancel()"></button>
</div>
<div class="modal-body">
  <p>Sunteți sigur că doriți să ștergeți laboratorul <strong>{{ lab.topic }}</strong>?</p>
  <p class="text-danger small">Această acțiune este ireversibilă!</p>
</div>
<div class="modal-footer">
  <button type="button" class="btn btn-secondary" (click)="cancel()">Anulează</button>
  <button type="button" class="btn btn-danger" (click)="confirmDelete()">Șterge</button>
</div>
