<div class="login-container">
  <div class="login-card">
    <div class="login-header">
      <h2>Student Management System</h2>
      <p>Please sign in to continue</p>
    </div>

    <form (ngSubmit)="onSubmit()" class="login-form">
      @if (error) {
        <div class="alert alert-danger">{{ error }}</div>
      }

      <div class="form-group">
        <label for="email">Email</label>
        <input
          [(ngModel)]="email"
          [disabled]="loading"
          class="form-control"
          id="email"
          name="email"
          placeholder="Enter your email"
          required
          type="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          [(ngModel)]="password"
          [disabled]="loading"
          class="form-control"
          id="password"
          name="password"
          placeholder="Enter your password"
          required
          type="password"
        />
      </div>

      <button [disabled]="loading" class="btn btn-primary btn-block" type="submit">
        @if (loading) {
          <span>Signing in...</span>
        } @else {
          <span>Sign In</span>
        }
      </button>
    </form>

    <div class="login-footer">
      <div class="credentials-section">
        <h4>Demo Credentials</h4>
        <div class="credentials-grid">
          <div class="credential-item">
            <strong>Admin:</strong>
            <span>admin&#64;school.com</span>
            <span class="password">admin123</span>
          </div>
          <div class="credential-item">
            <strong>Teacher:</strong>
            <span>ion.popescu&#64;academic.tuiasi.ro</span>
            <span class="password">teacher123</span>
          </div>
          <div class="credential-item">
            <strong>Student:</strong>
            <span>bogdan.ilie.1102a&#64;student.tuiasi.ro	</span>
            <span class="password">student123</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
