<div class="modal-header">
  <h4 class="modal-title">Schimbă Parola</h4>
  <button type="button" class="btn-close" aria-label="Close" (click)="activeModal.dismiss('cancel')"></button>
</div>

<form #passwordForm="ngForm" (ngSubmit)="onSubmit()">
  <div class="modal-body">
    @if (error) {
      <div class="alert alert-danger">{{ error }}</div>
    }
    @if (success) {
      <div class="alert alert-success">{{ success }}</div>
    }

    <div class="mb-3">
      <label for="currentPassword" class="form-label">Parola Curentă</label>
      <input
        type="password"
        id="currentPassword"
        name="currentPassword"
        [(ngModel)]="currentPassword"
        class="form-control"
        [disabled]="loading"
        required
      />
    </div>

    <div class="mb-3">
      <label for="newPassword" class="form-label">Parola Nouă</label>
      <input
        type="password"
        id="newPassword"
        name="newPassword"
        [(ngModel)]="newPassword"
        class="form-control"
        [disabled]="loading"
        required
      />
    </div>

    <div class="mb-3">
      <label for="confirmPassword" class="form-label">Confirmă Parola Nouă</label>
      <input
        type="password"
        id="confirmPassword"
        name="confirmPassword"
        [(ngModel)]="confirmPassword"
        class="form-control"
        [disabled]="loading"
        required
      />
    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="activeModal.dismiss('cancel')" [disabled]="loading">
      Anulează
    </button>
    <button type="submit" class="btn btn-primary" [disabled]="loading || passwordForm.invalid">
      @if (loading) {
        <span>Se procesează...</span>
      } @else {
        <span>Schimbă Parola</span>
      }
    </button>
  </div>
</form>
