<div class="container mt-4">
  <div class="card">
    <div class="card-header bg-soft-primary text-dark d-flex justify-content-between align-items-center">
      <h2 class="mb-0">Teachers</h2>
      <button (click)="openAddModal()" class="btn btn-light">Add Teacher</button>
    </div>
    <div class="card-body bg-light">
      @if (teachers().length) {
        <div class="table-responsive">
          <table class="table table-striped table-hover table-soft">
            <thead class="table-light">
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Actions</th>
            </tr>
            </thead>
            <tbody>
              @for (teacher of getPaginatedTeachers(); track teacher.id) {
                <tr>
                  <td>{{ teacher.name }}</td>
                  <td>{{ teacher.email }}</td>
                  <td>
                    <button class="btn btn-sm btn-outline-primary me-2"
                            (click)="editTeacher(teacher)">
                      Edit
                    </button>
                    <button class="btn btn-sm btn-outline-danger"
                            (click)="deleteTeacher(teacher.id)">
                      Delete
                    </button>
                  </td>
                </tr>
              }
            </tbody>
          </table>
        </div>

        <mat-paginator
          [length]="filteredTeachers().length"
          [pageSize]="pageSize"
          [pageIndex]="pageIndex"
          [pageSizeOptions]="pageSizeOptions"
          (page)="onPageChange($event)"
          showFirstLastButtons
          aria-label="Select page of teachers">
        </mat-paginator>
      } @else {
        <div class="alert alert-info">
          No teachers found.
        </div>
      }
    </div>
  </div>
</div>
