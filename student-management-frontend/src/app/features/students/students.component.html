<div class="container mt-4">
  <div class="card">
    <div class="card-header bg-soft-primary text-dark d-flex justify-content-between align-items-center">
      <h2 class="mb-0">Students</h2>
      @if (isAdmin) {
        <div>
          <button class="btn btn-success me-2" (click)="triggerFileInput()">
            <i class="bi bi-file-earmark-excel"></i> Import Excel
          </button>
          <button class="btn btn-light" (click)="openAddModal()">Add Student</button>
          <input type="file" id="excelFileInput" accept=".xlsx,.xls" (change)="onFileSelected($event)" style="display: none;">
        </div>
      }
    </div>
    <div class="card-body bg-light">
      @if (students.length) {
        <!-- Filter Section -->
        <div class="mb-3">
          <div class="row">
            <div class="col-md-4">
              <label class="form-label fw-bold">Filter by Group</label>
              <select
                class="form-select"
                [(ngModel)]="selectedGroupFilter"
                (change)="onGroupFilterChange()">
                <option [ngValue]="null">All Groups</option>
                @for (group of groups; track group.id) {
                  <option [ngValue]="group.id">{{ group.name }}</option>
                }
              </select>
            </div>
          </div>
        </div>

        <div class="table-responsive">
          <table class="table table-striped table-hover table-soft">
            <thead class="table-light">
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Group</th>
              @if (isAdmin) {
                <th>Actions</th>
              }
            </tr>
            </thead>
            <tbody>
              @for (s of getPaginatedStudents(); track s.id) {
                <tr>
                  <td>{{ s.name }}</td>
                  <td>{{ s.email }}</td>
                  <td>{{ s.group_name }}</td>
                  @if (isAdmin) {
                    <td>
                      <button class="btn btn-sm btn-outline-primary me-2" (click)="editStudent(s)">Edit</button>
                      <button class="btn btn-sm btn-outline-danger" (click)="deleteStudent(s.id)">Delete</button>
                    </td>
                  }
                </tr>
              }
            </tbody>
          </table>
        </div>

        <mat-paginator
          [length]="filteredStudents.length"
          [pageSize]="pageSize"
          [pageIndex]="pageIndex"
          [pageSizeOptions]="pageSizeOptions"
          (page)="onPageChange($event)"
          showFirstLastButtons
          aria-label="Select page of students">
        </mat-paginator>
      } @else {
        <div class="alert alert-info">No students found.</div>
      }
    </div>
  </div>
</div>
